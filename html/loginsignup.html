<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantity Measurement App</title>
  <link rel="stylesheet" href="../css/loginsignup.css" />
</head>
<body>
  <div class="page-container">
    <div class="auth-card">

      <div class="left-panel">
        <div class="image-box">
          <svg
            class="measurement-svg"
            viewBox="0 0 300 300"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="Quantity Measurement App Illustration"
          >
            <defs>
              <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#8ec5ff" />
                <stop offset="100%" stop-color="#3f7ae0" />
              </linearGradient>
              <linearGradient id="rulerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#f9d46b" />
                <stop offset="100%" stop-color="#efb72e" />
              </linearGradient>
            </defs>

            <circle cx="150" cy="150" r="150" fill="url(#bgGrad)" />

            <rect x="55" y="150" width="190" height="45" rx="10" fill="url(#rulerGrad)" />
            <rect x="55" y="150" width="190" height="45" rx="10" fill="none" stroke="#d29a1b" stroke-width="3"/>

            <line x1="75" y1="150" x2="75" y2="132" stroke="#7a5a00" stroke-width="4"/>
            <line x1="95" y1="150" x2="95" y2="140" stroke="#7a5a00" stroke-width="3"/>
            <line x1="115" y1="150" x2="115" y2="132" stroke="#7a5a00" stroke-width="4"/>
            <line x1="135" y1="150" x2="135" y2="140" stroke="#7a5a00" stroke-width="3"/>
            <line x1="155" y1="150" x2="155" y2="132" stroke="#7a5a00" stroke-width="4"/>
            <line x1="175" y1="150" x2="175" y2="140" stroke="#7a5a00" stroke-width="3"/>
            <line x1="195" y1="150" x2="195" y2="132" stroke="#7a5a00" stroke-width="4"/>
            <line x1="215" y1="150" x2="215" y2="140" stroke="#7a5a00" stroke-width="3"/>

            <rect x="80" y="70" width="55" height="65" rx="10" fill="#ffffff" opacity="0.95"/>
            <rect x="165" y="70" width="55" height="65" rx="10" fill="#ffffff" opacity="0.95"/>

            <text x="107" y="110" text-anchor="middle" font-size="34" font-weight="700" fill="#3f7ae0">L</text>
            <text x="192" y="110" text-anchor="middle" font-size="34" font-weight="700" fill="#3f7ae0">kg</text>

            <path d="M95 205 L120 100 L145 205 Z" fill="#f04444" />
            <path d="M165 205 C165 170, 200 160, 215 120 C230 160, 245 170, 245 205 Z" fill="#ffffff" opacity="0.95" />
            <line x1="215" y1="120" x2="215" y2="90" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
            <line x1="190" y1="145" x2="240" y2="145" stroke="#3f7ae0" stroke-width="5" stroke-linecap="round"/>
          </svg>
        </div>

        <h2>Quantity Measurement App</h2>
        <p>Welcome back. Sign in or create your account.</p>
      </div>

      <div class="right-panel">
        <div class="tabs">
          <button type="button" id="signinTab" class="tab-btn active">LOGIN</button>
          <button type="button" id="signupTab" class="tab-btn">SIGNUP</button>
        </div>

        <div class="forms-wrapper">
          <!-- Sign In Form -->
          <form id="signinForm" class="form active-form" novalidate>
            <div class="input-group">
              <label for="signinEmail">Email Id</label>
              <input type="email" id="signinEmail" placeholder="Enter your email" />
              <small class="error-message" id="signinEmailError"></small>
            </div>

            <div class="input-group password-group">
              <label for="signinPassword">Password</label>
              <div class="password-box">
                <input
                  type="password"
                  id="signinPassword"
                  placeholder="Enter your password"
                />
                <button type="button" class="toggle-password" data-target="signinPassword">👁</button>
              </div>
              <small class="error-message" id="signinPasswordError"></small>
            </div>

            <button type="submit" class="submit-btn">Login</button>
          </form>

          <!-- Sign Up Form -->
          <form id="signupForm" class="form" novalidate>
            <div class="input-group">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" placeholder="Enter your full name" />
              <small class="error-message" id="fullNameError"></small>
            </div>

            <div class="input-group">
              <label for="signupEmail">Email Id</label>
              <input type="email" id="signupEmail" placeholder="Enter your email" />
              <small class="error-message" id="signupEmailError"></small>
            </div>

            <div class="input-group password-group">
              <label for="signupPassword">Password</label>
              <div class="password-box">
                <input
                  type="password"
                  id="signupPassword"
                  placeholder="Create password"
                />
                <button type="button" class="toggle-password" data-target="signupPassword">👁</button>
              </div>
              <small class="error-message" id="signupPasswordError"></small>
            </div>

            <div class="input-group">
              <label for="mobileNumber">Mobile Number</label>
              <input type="text" id="mobileNumber" placeholder="Enter mobile number" maxlength="10" />
              <small class="error-message" id="mobileNumberError"></small>
            </div>

            <button type="submit" class="submit-btn">Signup</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/loginsignup.js"></script>
</body>
</html>
